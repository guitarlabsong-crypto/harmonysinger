<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Dual Tuner</title>
    <style>
        :root {
            --bg-dark: #1a0f0d;
            --bg-main: #2d1b15;
            --panel: #3e2723;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red: #ff5252;
            --empty: #261410;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 95%; max-width: 550px; height: 90vh;
            border-radius: 40px; display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid #4e342e;
            position: relative; overflow: hidden;
        }

        /* --- 듀얼 미터 섹션 --- */
        .meters-sidebar {
            width: 100px; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; padding: 15px 10px; box-sizing: border-box; gap: 8px;
            border-right: 1px solid #4e342e;
        }

        .meter-column {
            flex: 1; display: flex; flex-direction: column-reverse; gap: 3px;
            height: 100%; position: relative;
        }

        .meter-label {
            position: absolute; bottom: -10px; width: 100%; text-align: center;
            font-size: 0.6rem; color: var(--gold); opacity: 0.8; font-weight: bold;
        }

        .seg {
            width: 100%; flex: 1; background-color: var(--empty); border-radius: 1px;
            transition: background-color 0.05s, box-shadow 0.05s;
        }

        /* 볼륨 미터 색상 (Volume) */
        .vol-seg.active { background-color: #90a4ae; box-shadow: 0 0 5px #90a4ae; }
        
        /* 피치 튜너 색상 (Pitch) */
        .pitch-seg.active.low { background-color: #2196f3; box-shadow: 0 0 8px #2196f3; }
        .pitch-seg.active.mid { background-color: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .pitch-seg.active.high { background-color: #f44336; box-shadow: 0 0 8px #f44336; }

        /* 메인 게임 영역 */
        .game-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 30px 20px; box-sizing: border-box;
            justify-content: space-between; align-items: center;
        }

        .header { text-align: center; width: 100%; }
        .score-row { display: flex; justify-content: space-between; color: var(--gold); font-weight: bold; }
        .brand { font-size: 0.7rem; letter-spacing: 1px; opacity: 0.6; }
        .title { font-size: 1.5rem; font-weight: bold; color: white; margin: 5px 0; }

        #target-display { 
            font-size: 2rem; font-weight: 900; color: white; 
            margin: 20px 0; min-height: 2.5rem; text-align: center;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        #status-msg { font-size: 1.1rem; text-align: center; height: 3rem; color: #fff; line-height: 1.4; }
        .life-ui { color: var(--red); font-size: 1.4rem; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; }
        button { 
            background: #5d4037; color: white; border: none; padding: 16px 45px; 
            border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.2s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        #replay-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); font-size: 0.9rem; visibility: hidden; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 15, 13, 0.98); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="meters-sidebar">
        <div class="meter-column" id="vol-meter"></div>
        <div class="meter-column" id="pitch-meter"></div>
    </div>

    <div class="game-area">
        <div id="game-over">
            <h2 style="color:var(--red); font-size: 3rem; margin:0;">GAME OVER</h2>
            <p style="font-size: 1.5rem; margin: 20px 0;">SCORE: <span id="final-score">0</span></p>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>

        <div class="header">
            <div class="score-row">
                <span>SCORE: <span id="score-val">0</span></span>
                <span class="life-ui" id="hearts">♥♥♥</span>
            </div>
            <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
            <h1 class="title">Singing Test</h1>
            <div id="level-tag" style="color: var(--gold);">LEVEL 1</div>
        </div>

        <div id="status-msg">버튼을 누르면 시작됩니다.</div>
        <div id="target-display">-</div>

        <div id="detected-note" style="font-weight: bold; color: var(--gold); height: 1.5rem; font-size: 1.2rem;"></div>

        <div class="btn-group">
            <button id="replay-btn" onclick="playQuestion()">문제 재성 ↻</button>
            <button id="start-btn" onclick="initGame()">START GAME</button>
        </div>
    </div>
</div>

<script>
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream;
let level = 1, score = 0, lives = 3;
let questionSeq = [], currentStep = 0;
let isListening = false, isPlaying = false;
let volBlocks = [], pitchBlocks = [];

// 24개 세그먼트 생성
function createMeters() {
    const volMeter = document.getElementById('vol-meter');
    const pitchMeter = document.getElementById('pitch-meter');
    
    for (let i = 0; i < 24; i++) {
        // 볼륨 블록
        const v = document.createElement('div');
        v.className = 'seg vol-seg';
        volMeter.appendChild(v);
        volBlocks.push(v);

        // 피치 블록
        const p = document.createElement('div');
        p.className = 'seg pitch-seg';
        if (i < 8) p.classList.add('low');
        else if (i < 16) p.classList.add('mid');
        else p.classList.add('high');
        pitchMeter.appendChild(p);
        pitchBlocks.push(p);
    }
}

async function initGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        micStream.connect(analyser);
        createMeters();
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    lives = 3; currentStep = 0; questionSeq = [];
    updateUI();
    for(let i=0; i < level; i++) questionSeq.push(Math.floor(Math.random() * NOTES.length));
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true; isListening = false;
    clearMeters();
    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-msg').innerText = "음을 잘 듣고 기억하세요.";
    
    let textOut = "";
    for (let idx of questionSeq) {
        document.getElementById('target-display').innerText = NOTES[idx];
        textOut += NOTES[idx] + " ";
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 400));
    }
    
    document.getElementById('target-display').innerText = textOut.trim();
    document.getElementById('status-msg').innerText = "똑같이 따라 하세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    isPlaying = false; isListening = true;
    requestAnimationFrame(updateFrame);
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

function updateFrame() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    
    // 1. 볼륨(데시벨) 계산
    let sum = 0;
    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
    const rms = Math.sqrt(sum / buffer.length);
    
    // 2. 피치 계산
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    // 그래프 업데이트
    if (rms > 0.01) {
        // 볼륨 미터 (감도 조절)
        let vCount = Math.min(24, Math.floor(rms * 150));
        volBlocks.forEach((b, i) => i < vCount ? b.classList.add('active') : b.classList.remove('active'));

        // 피치 튜너 (정교한 튜너 로직)
        if (pitch !== -1) {
            const midi = 12 * Math.log2(pitch / 261.63);
            let pCount = Math.round(((midi + 2) / 15) * 24);
            pCount = Math.max(1, Math.min(24, pCount));
            pitchBlocks.forEach((b, i) => i < pCount ? b.classList.add('active') : b.classList.remove('active'));
        }
    } else {
        clearMeters();
    }

    // 판정 로직
    if (pitch !== -1 && rms > 0.05) {
        const midi = Math.round(12 * Math.log2(pitch / 261.63));
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const currentMod = ((midi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(currentMod)) {
            const detected = mapping[currentMod];
            document.getElementById('detected-note').innerText = `인식: ${NOTES[detected]}`;

            if (detected === questionSeq[currentStep]) {
                currentStep++;
                if (currentStep >= questionSeq.length) {
                    isListening = false;
                    score += 50;
                    document.getElementById('status-msg').innerText = "성공!";
                    level++;
                    setTimeout(startNewLevel, 1200);
                    return;
                }
            } else if (detected !== questionSeq[currentStep]) {
                lives--;
                updateUI();
                if (lives <= 0) showGameOver();
                else {
                    isListening = false;
                    document.getElementById('status-msg').innerText = "음정이 틀렸습니다!";
                    setTimeout(playQuestion, 1500);
                    return;
                }
            }
        }
    }
    requestAnimationFrame(updateFrame);
}

function clearMeters() {
    volBlocks.forEach(b => b.classList.remove('active'));
    pitchBlocks.forEach(b => b.classList.remove('active'));
    document.getElementById('detected-note').innerText = "";
}

function updateUI() {
    document.getElementById('score-val').innerText = score;
    document.getElementById('hearts').innerText = "♥".repeat(lives) + "♡".repeat(3-lives);
    document.getElementById('level-tag').innerText = `LEVEL ${level}`;
}

function showGameOver() {
    isListening = false;
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

function getPitch(buffer, sampleRate) {
    let bestP = -1, minD = Infinity;
    for (let p = 35; p < 200; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
