<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red: #ff5252;
            --bar-bg: #6d4c41;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 95%; max-width: 450px; height: 90vh;
            border-radius: 40px; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            position: relative; overflow: hidden; padding: 20px; box-sizing: border-box;
        }

        /* 헤더 영역 */
        .header { text-align: center; width: 100%; margin-bottom: 10px; }
        .score-row { display: flex; justify-content: space-between; width: 100%; font-weight: bold; color: var(--gold); }
        .brand { font-size: 0.7rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.4rem; font-weight: bold; color: white; margin: 5px 0; }
        .life-ui { color: var(--red); font-size: 1.2rem; }

        /* 게임 상태 및 문제 표시 */
        #status-text { font-size: 1rem; text-align: center; height: 3rem; color: #fff; line-height: 1.4; margin-top: 10px; }
        #target-display { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 15px; min-height: 1.8rem;}

        /* --- 핵심: 음계 막대 비주얼라이저 --- */
        .visualizer-container {
            width: 100%; display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 20px; flex: 1; justify-content: center;
        }
        .note-bar-wrapper {
            display: flex; align-items: center; width: 100%; gap: 10px;
        }
        .note-label {
            width: 30px; text-align: right; font-weight: bold; color: var(--accent); font-size: 0.9rem;
        }
        .bar-bg {
            flex: 1; height: 12px; background-color: var(--bar-bg);
            border-radius: 6px; overflow: hidden; position: relative;
        }
        .bar-fill {
            height: 100%; background-color: var(--gold); width: 0%;
            border-radius: 6px; 
            /* 고무줄처럼 부드러운 움직임 */
            transition: width 0.1s ease-out, background-color 0.2s; 
        }
        /* 현재 부르는 음 강조 */
        .active-bar .bar-fill { background-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .active-bar .note-label { color: #fff; }

        /* 컨트롤 영역 */
        #replay-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
            visibility: hidden; margin-bottom: 15px;
        }
        .main-btn { 
            background: #8d6e63; color: white; border: none; 
            padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 게임 오버 레이어 */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 27, 21, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-over">
        <h2 style="color:var(--red); font-size: 2.5rem;">GAME OVER</h2>
        <p style="font-size: 1.2rem;">최종 점수: <span id="final-score">0</span></p>
        <button class="main-btn" onclick="location.reload()">다시 시작</button>
    </div>

    <div class="header">
        <div class="score-row">
            <span>SCORE: <span id="score">0</span></span>
            <span class="life-ui" id="life-ui">♥♥♥</span>
        </div>
        <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
        <h1 class="title">Singing Test</h1>
        <div id="level-info" style="color: var(--gold)">Level 1</div>
    </div>

    <div id="status-text">START 버튼을 눌러 마이크를 연결하세요.</div>
    <div id="target-display">🎤</div>

    <div class="visualizer-container" id="visualizer">
        </div>

    <button id="replay-btn" onclick="playQuestion()">음정 다시 듣기 ↻</button>
    <button id="start-btn" class="main-btn" onclick="startGame()">START GAME</button>
</div>

<script>
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88]; // C4~B4

let audioCtx, analyser, micStream;
let level = 1;
let score = 0;
let lives = 3;
let questionSequence = [];
let currentStep = 0;
let isListening = false;
let isPlaying = false;
let lastNoteTime = 0;
let barElements = []; // 막대 엘리먼트 저장

// 음계 막대 UI 동적 생성
function createNoteBars() {
    const container = document.getElementById('visualizer');
    // 낮은 음부터 위로 쌓이도록 역순 생성
    for (let i = NOTES.length - 1; i >= 0; i--) {
        const wrapper = document.createElement('div');
        wrapper.className = 'note-bar-wrapper';
        wrapper.id = `note-bar-${i}`;

        const label = document.createElement('div');
        label.className = 'note-label';
        label.innerText = NOTES[i];

        const barBg = document.createElement('div');
        barBg.className = 'bar-bg';

        const barFill = document.createElement('div');
        barFill.className = 'bar-fill';
        barFill.id = `bar-fill-${i}`;

        barBg.appendChild(barFill);
        wrapper.appendChild(label);
        wrapper.appendChild(barBg);
        container.appendChild(wrapper);
        barElements[i] = wrapper; // 나중에 접근하기 위해 저장
    }
}

async function startGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024; 
        micStream.connect(analyser);
        createNoteBars(); // 막대 UI 생성
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    currentStep = 0;
    lives = 3; 
    updateLifeUI();
    questionSequence = [];
    document.getElementById('level-info').innerText = `Level ${level}`;
    
    for(let i=0; i < level; i++) {
        questionSequence.push(Math.floor(Math.random() * NOTES.length));
    }
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true;
    isListening = false;
    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-text').innerText = "문제를 듣고 기억하세요!";
    
    let combinedText = "";
    for (let idx of questionSequence) {
        document.getElementById('target-display').innerText = NOTES[idx];
        combinedText += NOTES[idx] + " ";
        // 문제 재생 시 해당 막대 시각화
        updateVisualizer(idx, 100); 
        await playTone(FREQS[idx]);
        updateVisualizer(idx, 0); // 재생 후 초기화
        await new Promise(r => setTimeout(r, 300));
    }

    document.getElementById('target-display').innerText = combinedText.trim();
    document.getElementById('status-text').innerText = "순서대로 따라 부르세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    
    isPlaying = false;
    isListening = true;
    detectLoop();
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

function detectLoop() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const result = getPitchAndVolume(buffer, audioCtx.sampleRate);

    // 비주얼라이저 초기화
    for(let i=0; i<NOTES.length; i++) updateVisualizer(i, 0);

    if (result.pitch !== -1) {
        const semi = Math.round(12 * Math.log2(result.pitch / 261.63));
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const noteIdx = ((semi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(noteIdx)) {
            const detectedIdx = mapping[noteIdx];
            // 볼륨에 비례하여 막대 채우기 (고무줄 효과)
            const fillPercent = Math.min(100, result.volume * 200); 
            updateVisualizer(detectedIdx, fillPercent, true);

            const now = Date.now();
            // 일정 볼륨 이상일 때만 정답 판정
            if (now - lastNoteTime > 800 && result.volume > 0.05) { 
                lastNoteTime = now;

                if (detectedIdx === questionSequence[currentStep]) {
                    currentStep++;
                    if (currentStep >= questionSequence.length) {
                        isListening = false;
                        score += 50;
                        document.getElementById('score').innerText = score;
                        document.getElementById('status-text').innerText = "성공! 다음 레벨로.";
                        level++;
                        setTimeout(startNewLevel, 1200);
                        return;
                    } else {
                        document.getElementById('status-text').innerText = `맞았습니다! (${currentStep}/${level})`;
                    }
                } else {
                    lives--;
                    updateLifeUI();
                    if (lives <= 0) {
                        isListening = false;
                        showGameOver();
                    } else {
                        document.getElementById('status-text').innerText = `틀렸습니다! 다시 해보세요.\n(남은 기회: ${lives})`;
                    }
                }
            }
        }
    }
    requestAnimationFrame(detectLoop);
}

// 비주얼라이저 막대 업데이트
function updateVisualizer(idx, percent, isActive = false) {
    const fill = document.getElementById(`bar-fill-${idx}`);
    const wrapper = barElements[idx];
    if (fill && wrapper) {
        fill.style.width = `${percent}%`;
        if (isActive) wrapper.classList.add('active-bar');
        else wrapper.classList.remove('active-bar');
    }
}

function updateLifeUI() {
    document.getElementById('life-ui').innerText = "♥".repeat(lives) + "♡".repeat(3 - lives);
}

function showGameOver() {
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

// 피치 및 볼륨 동시 검출
function getPitchAndVolume(buffer, sampleRate) {
    let sum = 0;
    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
    const rms = Math.sqrt(sum / buffer.length);
    if (rms < 0.03) return { pitch: -1, volume: rms }; // 소리가 너무 작으면 무시

    let bestP = -1;
    let minD = Infinity;
    for (let p = 30; p < 200; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return { pitch: sampleRate / bestP, volume: rms };
}
</script>
</body>
</html>
