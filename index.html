<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red-point: #ff5252;
            --low-blue: #448aff;
            --mid-green: #66bb6a;
            --high-red: #ef5350;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 95%; max-width: 500px; height: 90vh;
            border-radius: 40px; display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            position: relative; overflow: hidden;
        }

        /* --- 1. 왼쪽 세로형 오디오 레벨/피치 그래프 --- */
        .pitch-visualizer-aside {
            width: 60px; height: 100%;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid #6d4c41;
            position: relative;
            display: flex; align-items: flex-end; /* 아래에서 위로 차오름 */
        }
        #pitch-bar {
            width: 100%;
            height: 0%; /* 실시간 가변 */
            transition: height 0.1s ease-out, background-color 0.3s;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 2. 메인 게임 영역 */
        .game-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 30px 20px; box-sizing: border-box;
            justify-content: space-between; align-items: center;
        }

        .header { text-align: center; width: 100%; }
        .score-row { display: flex; justify-content: space-between; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .brand { font-size: 0.75rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.5rem; font-weight: bold; color: white; margin: 5px 0; }

        #status-msg { font-size: 1.1rem; text-align: center; height: 3rem; color: #fff; line-height: 1.4; }
        #target-display { font-size: 2.2rem; font-weight: 900; color: white; margin: 20px 0; min-height: 2.5rem; }
        
        .life-ui { color: var(--red-point); font-size: 1.3rem; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        button { 
            background: #8d6e63; color: white; border: none; padding: 16px 40px; 
            border-radius: 35px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        #replay-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--accent); font-size: 0.9rem; visibility: hidden; }

        /* 게임 종료 오버레이 */
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 27, 21, 0.98); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="pitch-visualizer-aside">
        <div id="pitch-bar"></div>
    </div>

    <div class="game-area">
        <div id="game-over-screen">
            <h2 style="color:var(--red-point); font-size: 3rem;">GAME OVER</h2>
            <p style="font-size: 1.5rem;">SCORE: <span id="final-score">0</span></p>
            <button onclick="location.reload()">RETRY</button>
        </div>

        <div class="header">
            <div class="score-row">
                <span>SCORE: <span id="score-val">0</span></span>
                <span class="life-ui" id="hearts">♥♥♥</span>
            </div>
            <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
            <h1 class="title">Singing Test</h1>
            <div id="level-tag" style="color: var(--gold);">LEVEL 1</div>
        </div>

        <div id="status-msg">준비되셨나요? 시작 버튼을 누르세요.</div>
        <div id="target-display">-</div>

        <div id="current-note-name" style="font-size: 1.2rem; font-weight: bold; color: var(--gold); height: 1.5rem;"></div>

        <div class="btn-group">
            <button id="replay-btn" onclick="playQuestion()">재생하기 ↻</button>
            <button id="start-btn" onclick="initAudio()">START GAME</button>
        </div>
    </div>
</div>

<script>
/* -----------------------------------------------------------
   [설정] 다이아토닉 C4~B4 주파수 및 음계
----------------------------------------------------------- */
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream;
let level = 1, score = 0, lives = 3;
let questionSeq = [], currentStep = 0;
let isListening = false, isPlaying = false;

async function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        micStream.connect(analyser);
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    lives = 3; // 레벨당 3번의 기회
    currentStep = 0;
    questionSeq = [];
    updateUI();
    
    for(let i=0; i < level; i++) {
        questionSeq.push(Math.floor(Math.random() * NOTES.length));
    }
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true; isListening = false;
    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-msg').innerText = "문제를 듣고 기억하세요.";
    
    let textOut = "";
    for (let idx of questionSeq) {
        document.getElementById('target-display').innerText = NOTES[idx];
        textOut += NOTES[idx] + " ";
        // 소리 재생 시 그래프도 해당 음 높이로 보여줌
        updatePitchBar(idx);
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 350));
    }
    
    document.getElementById('target-display').innerText = textOut.trim();
    document.getElementById('status-msg').innerText = "이제 똑같이 따라 부르세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    isPlaying = false; isListening = true;
    requestAnimationFrame(updateFrame);
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

/* -----------------------------------------------------------
   [핵심] 실시간 그래프 업데이트 및 판정 로직
----------------------------------------------------------- */
function updateFrame() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        // C4(도) ~ B4(시) 사이의 위치를 0~100%로 변환
        const midi = 12 * Math.log2(pitch / 261.63);
        const noteIdxRaw = Math.max(0, Math.min(6.5, (midi / 2))); // 대략적인 인덱스 위치
        
        // 그래프 높이 업데이트
        updatePitchBar(midi);

        // 정답 판정 (다이아토닉 인덱스 기반)
        const noteIdx = Math.round(midi);
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const currentMod = ((noteIdx % 12) + 12) % 12;

        if (mapping.hasOwnProperty(currentMod)) {
            const detected = mapping[currentMod];
            document.getElementById('current-note-name').innerText = `인식 중: ${NOTES[detected]}`;

            if (detected === questionSeq[currentStep]) {
                currentStep++;
                if (currentStep >= questionSeq.length) {
                    isListening = false;
                    score += 50;
                    document.getElementById('status-msg').innerText = "통과! +50점";
                    level++;
                    setTimeout(startNewLevel, 1300);
                    return;
                } else {
                    document.getElementById('status-msg').innerText = `좋아요! (${currentStep}/${level})`;
                }
            } else if (detected !== questionSeq[currentStep] && buffer[0] > 0.1) {
                // 틀렸을 때 처리 (너무 짧은 소음 방지를 위해 볼륨 체크)
                lives--;
                updateUI();
                if (lives <= 0) {
                    showGameOver();
                } else {
                    isListening = false;
                    document.getElementById('status-msg').innerText = "틀렸습니다! 다시 시도...";
                    setTimeout(playQuestion, 1500);
                }
                return;
            }
        }
    } else {
        document.getElementById('pitch-bar').style.height = '0%';
        document.getElementById('current-note-name').innerText = "";
    }
    requestAnimationFrame(updateFrame);
}

// 왼쪽 바 색상 및 높이 업데이트 (파랑 -> 초록 -> 빨강)
function updatePitchBar(midiValue) {
    const bar = document.getElementById('pitch-bar');
    // C4(0) ~ B4(11) 범위를 백분율로 환산
    const percent = Math.min(100, Math.max(5, (midiValue / 11) * 100));
    bar.style.height = percent + '%';

    // 색상 결정 로직
    if (percent < 35) {
        bar.style.backgroundColor = 'var(--low-blue)'; // 낮은 음 (파랑)
    } else if (percent < 70) {
        bar.style.backgroundColor = 'var(--mid-green)'; // 중간 음 (초록)
    } else {
        bar.style.backgroundColor = 'var(--high-red)'; // 높은 음 (빨강)
    }
}

function updateUI() {
    document.getElementById('score-val').innerText = score;
    document.getElementById('hearts').innerText = "♥".repeat(lives) + "♡".repeat(3-lives);
    document.getElementById('level-tag').innerText = `LEVEL ${level}`;
}

function showGameOver() {
    isListening = false;
    document.getElementById('game-over-screen').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

// 피치 검출 알고리즘 (AMDF)
function getPitch(buffer, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    if (Math.sqrt(rms / buffer.length) < 0.05) return -1;

    let bestP = -1, minD = Infinity;
    for (let p = 35; p < 200; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
