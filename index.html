<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red: #ff5252;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 95%; max-width: 500px; height: 90vh;
            border-radius: 40px; display: flex; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            position: relative; overflow: hidden;
        }

        /* 왼쪽 파형 그래프 영역 */
        .visualizer-container {
            width: 80px; height: 100%;
            background: rgba(0,0,0,0.2);
            border-right: 1px solid #6d4c41;
            position: relative;
        }
        #waveform { width: 100%; height: 100%; }

        /* 오른쪽 게임 메인 영역 */
        .game-main {
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            padding: 30px 15px; box-sizing: border-box;
        }

        .header { text-align: center; width: 100%; }
        .score-row { display: flex; justify-content: space-between; width: 100%; font-weight: bold; color: var(--gold); }
        .brand { font-size: 0.7rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.4rem; font-weight: bold; color: white; margin: 5px 0; }

        .mic-container {
            width: 130px; height: 130px; background: #6d4c41;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--bg-dark); transition: 0.3s;
        }
        #target-display { font-size: 1.5rem; font-weight: 900; color: white; text-align: center; }
        
        #status-text { font-size: 1rem; text-align: center; height: 3rem; color: #fff; line-height: 1.4; }
        .life-ui { color: var(--red); font-size: 1.2rem; }

        #replay-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
            visibility: hidden;
        }

        .main-btn { 
            background: #8d6e63; color: white; border: none; 
            padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 게임 오버 레이어 */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 27, 21, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        .active-mic { border-color: var(--gold); box-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="visualizer-container">
        <canvas id="waveform"></canvas>
    </div>

    <div class="game-main">
        <div id="game-over">
            <h2 style="color:var(--red); font-size: 2.5rem;">GAME OVER</h2>
            <p style="font-size: 1.2rem;">최종 점수: <span id="final-score">0</span></p>
            <button class="main-btn" onclick="location.reload()">다시 시작</button>
        </div>

        <div class="header">
            <div class="score-row">
                <span>SCORE: <span id="score">0</span></span>
                <span class="life-ui" id="life-ui">♥♥♥</span>
            </div>
            <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
            <h1 class="title">Singing Test</h1>
            <div id="level-info" style="color: var(--gold)">Level 1</div>
        </div>

        <div id="status-text">버튼을 눌러 마이크를 활성화하세요.</div>
        
        <div class="mic-container" id="mic-visual">
            <div id="target-display">🎤</div>
        </div>

        <button id="replay-btn" onclick="playQuestion()">음정 다시 듣기 ↻</button>

        <div id="user-pitch-info" style="color: var(--gold); font-weight: bold; height: 1.2rem;"></div>

        <button id="start-btn" class="main-btn" onclick="startGame()">START GAME</button>
    </div>
</div>

<script>
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream, canvasCtx, canvas;
let level = 1;
let score = 0;
let lives = 3;
let questionSequence = [];
let currentStep = 0;
let isListening = false;
let isPlaying = false;
let lastNoteTime = 0;

function initCanvas() {
    canvas = document.getElementById('waveform');
    canvasCtx = canvas.getContext('2d');
    // 캔버스 크기 조정
    canvas.width = 80;
    canvas.height = window.innerHeight * 0.9;
}

async function startGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; // 파형용
        micStream.connect(analyser);
        initCanvas();
        drawWaveform(); // 파형 그리기 시작
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    currentStep = 0;
    lives = 3; // 레벨마다 기회 3번 초기화
    updateLifeUI();
    questionSequence = [];
    document.getElementById('level-info').innerText = `Level ${level}`;
    
    for(let i=0; i < level; i++) {
        questionSequence.push(Math.floor(Math.random() * NOTES.length));
    }
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true;
    isListening = false;
    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-text').innerText = "음정을 듣고 기억하세요!";
    
    let combinedText = "";
    for (let idx of questionSequence) {
        document.getElementById('target-display').innerText = NOTES[idx];
        combinedText += NOTES[idx] + " ";
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 400));
    }

    document.getElementById('target-display').innerText = combinedText.trim();
    document.getElementById('status-text').innerText = "순서대로 따라 부르세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    
    isPlaying = false;
    isListening = true;
    detectLoop();
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

function detectLoop() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        const now = Date.now();
        if (now - lastNoteTime > 800) { // 중복 인식 방지 간격
            const semi = Math.round(12 * Math.log2(pitch / 261.63));
            const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
            const noteIdx = ((semi % 12) + 12) % 12;

            if (mapping.hasOwnProperty(noteIdx)) {
                const detectedIdx = mapping[noteIdx];
                document.getElementById('user-pitch-info').innerText = `인식: ${NOTES[detectedIdx]}`;
                lastNoteTime = now;

                if (detectedIdx === questionSequence[currentStep]) {
                    currentStep++;
                    document.getElementById('mic-visual').classList.add('active-mic');
                    setTimeout(() => document.getElementById('mic-visual').classList.remove('active-mic'), 200);

                    if (currentStep >= questionSequence.length) {
                        isListening = false;
                        score += 50;
                        document.getElementById('score').innerText = score;
                        document.getElementById('status-text').innerText = "성공! 다음 레벨로.";
                        level++;
                        setTimeout(startNewLevel, 1200);
                        return;
                    }
                } else {
                    lives--;
                    updateLifeUI();
                    if (lives <= 0) {
                        isListening = false;
                        showGameOver();
                    } else {
                        document.getElementById('status-text').innerText = `틀렸습니다! 다시 해보세요.\n(남은 기회: ${lives})`;
                    }
                }
            }
        }
    }
    requestAnimationFrame(detectLoop);
}

function updateLifeUI() {
    document.getElementById('life-ui').innerText = "♥".repeat(lives) + "♡".repeat(3 - lives);
}

function drawWaveform() {
    requestAnimationFrame(drawWaveform);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(dataArray);

    canvasCtx.fillStyle = '#2d1b15';
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeStyle = '#ffb74d';
    canvasCtx.beginPath();

    const sliceHeight = canvas.height / dataArray.length;
    let y = 0;

    for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const x = (v * canvas.width) / 2;

        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        y += sliceHeight;
    }
    canvasCtx.stroke();
}

function showGameOver() {
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

// 피치 검출 (YIN/AMDF 근사 로직)
function getPitch(buffer, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    if (Math.sqrt(rms / buffer.length) < 0.03) return -1;

    let bestP = -1;
    let minD = Infinity;
    for (let p = 30; p < 200; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
