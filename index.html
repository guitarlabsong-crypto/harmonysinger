<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red: #e57373;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 90%; max-width: 400px; height: 85vh;
            border-radius: 40px; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            padding: 30px 20px; box-sizing: border-box; position: relative;
        }

        .header { text-align: center; width: 100%; }
        .score-row { display: flex; justify-content: space-between; width: 100%; font-weight: bold; color: var(--gold); margin-bottom: 10px; }
        .brand { font-size: 0.8rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.6rem; font-weight: bold; color: white; margin: 5px 0; }

        /* 중앙 마이크 및 문제 표시 */
        .mic-container {
            width: 150px; height: 150px; background: #6d4c41;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; border: 4px solid var(--bg-dark); transition: 0.3s;
            flex-direction: column;
        }
        #target-display { font-size: 1.8rem; font-weight: 900; color: white; text-align: center; line-height: 1.2; }
        
        .life-display { color: var(--red); font-size: 1.2rem; margin-top: 10px; }

        #status-text { font-size: 1.1rem; text-align: center; margin: 15px 0; min-height: 3rem; color: #fff; }

        /* 다시 듣기 버튼 */
        #replay-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; cursor: pointer;
            visibility: hidden;
        }

        button.main-btn { 
            background: #8d6e63; color: white; border: none; 
            padding: 18px 60px; border-radius: 40px; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 게임 오버 레이어 */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 27, 21, 0.95); border-radius: 40px;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        #game-over h2 { color: var(--red); font-size: 3rem; margin-bottom: 10px; }
        #game-over p { font-size: 1.5rem; margin-bottom: 30px; }

        .active-mic { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 183, 77, 0.6); }
    </style>
</head>
<body>

<div class="container">
    <div id="game-over">
        <h2>GAME OVER</h2>
        <p>최종 점수: <span id="final-score">0</span></p>
        <button class="main-btn" onclick="location.reload()">다시 도전</button>
    </div>

    <div class="header">
        <div class="score-row">
            <span>SCORE: <span id="score">0</span></span>
            <span class="life-display" id="life-ui">♥♥♥</span>
        </div>
        <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
        <h1 class="title">Singing Test</h1>
        <div id="level-info">Level 1</div>
    </div>

    <div id="status-text">버튼을 눌러 시작하세요!</div>
    
    <div class="mic-container" id="mic-visual">
        <div id="target-display">🎤</div>
    </div>

    <button id="replay-btn" onclick="playQuestion()">음정 다시 듣기 ↻</button>

    <div id="user-pitch-info" style="color: var(--gold); height: 20px; font-weight: bold;"></div>

    <button id="start-btn" class="main-btn" onclick="startGame()">START GAME</button>
</div>

<script>
/* --- 설정 데이터 --- */
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream;
let level = 1;
let score = 0;
let lives = 3;
let questionSequence = [];
let currentStep = 0;
let isListening = false;
let isPlaying = false;
let lastDetectedNote = -1;

async function startGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micStream = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            micStream.connect(analyser);
        } catch(e) { alert("마이크 권한이 필요합니다."); return; }
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    currentStep = 0;
    questionSequence = [];
    document.getElementById('level-info').innerText = `Level ${level}`;
    
    // 다이아토닉(도-시) 랜덤 생성
    for(let i=0; i < level; i++) {
        questionSequence.push(Math.floor(Math.random() * NOTES.length));
    }
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true;
    isListening = false;
    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-text').innerText = "음정을 잘 들어보세요.";
    
    let combinedText = "";
    for (let idx of questionSequence) {
        document.getElementById('target-display').innerText = NOTES[idx];
        combinedText += NOTES[idx] + " ";
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 400));
    }

    document.getElementById('target-display').innerText = combinedText.trim();
    document.getElementById('status-text').innerText = "순서대로 따라 부르세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    
    isPlaying = false;
    isListening = true;
    lastDetectedNote = -1; // 이전 인식 기록 초기화
    detectLoop();
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

function detectLoop() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        const semi = Math.round(12 * Math.log2(pitch / 261.63));
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const noteIdxIn12 = ((semi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(noteIdxIn12)) {
            const detectedIdx = mapping[noteIdxIn12];
            document.getElementById('user-pitch-info').innerText = `인식: ${NOTES[detectedIdx]}`;

            // 정답 판정 (연속된 중복 인식 방지 로직 포함)
            if (detectedIdx === questionSequence[currentStep] && lastDetectedNote !== detectedIdx) {
                lastDetectedNote = detectedIdx; // 같은 음을 계속 인식하지 않도록 설정
                currentStep++;
                
                document.getElementById('mic-visual').classList.add('active-mic');
                setTimeout(() => document.getElementById('mic-visual').classList.remove('active-mic'), 200);

                if (currentStep >= questionSequence.length) {
                    isListening = false;
                    score += 50;
                    document.getElementById('score').innerText = score;
                    document.getElementById('status-text').innerText = "성공! +50점";
                    level++;
                    setTimeout(startNewLevel, 1200);
                    return;
                } else {
                    document.getElementById('status-text').innerText = `다음 음은? (${currentStep}/${level})`;
                }
            } else if (detectedIdx !== questionSequence[currentStep] && lastDetectedNote !== detectedIdx) {
                // 틀렸을 때 처리
                handleWrongNote();
            }
        }
    }
    requestAnimationFrame(detectLoop);
}

function handleWrongNote() {
    isListening = false;
    lives--;
    updateLifeUI();
    document.getElementById('status-text').innerText = "틀렸습니다! 다시 들어보세요.";
    
    if (lives <= 0) {
        showGameOver();
    } else {
        setTimeout(playQuestion, 1500); // 잠시 후 다시 들려줌
    }
}

function updateLifeUI() {
    document.getElementById('life-ui').innerText = "♥".repeat(lives) + "♡".repeat(3 - lives);
}

function showGameOver() {
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

function getPitch(buffer, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    if (Math.sqrt(rms / buffer.length) < 0.05) return -1;

    let bestP = -1;
    let minD = Infinity;
    for (let p = 40; p < 500; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
