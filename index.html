<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
            --red-point: #ff5252;
            --block-empty: #3e2723;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 95%; max-width: 500px; height: 90vh;
            border-radius: 40px; display: flex;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            position: relative; overflow: hidden;
        }

        /* --- 1. 정교한 튜너 스타일 피치 미터 --- */
        .meter-aside {
            width: 50px; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; flex-direction: column-reverse; /* 아래부터 쌓임 */
            padding: 10px 5px; box-sizing: border-box; gap: 2px;
            border-right: 1px solid #6d4c41;
        }
        .block {
            width: 100%; flex: 1;
            background-color: var(--block-empty);
            border-radius: 1px;
            transition: background-color 0.1s, box-shadow 0.1s;
        }
        
        /* 튜너 색상 정의 (3단계) */
        /* 하단 (파랑, 저음) */
        .block.active.low { background-color: #2196f3; box-shadow: 0 0 5px #2196f3; }
        /* 중간 (초록, 정음) */
        .block.active.mid { background-color: #4caf50; box-shadow: 0 0 10px #4caf50; }
        /* 상단 (빨강, 고음) */
        .block.active.high { background-color: #f44336; box-shadow: 0 0 5px #f44336; }

        /* 2. 메인 게임 영역 */
        .game-area {
            flex: 1; display: flex; flex-direction: column;
            padding: 30px 15px; box-sizing: border-box;
            justify-content: space-between; align-items: center;
        }

        .header { text-align: center; width: 100%; }
        .score-row { display: flex; justify-content: space-between; color: var(--gold); font-weight: bold; }
        .brand { font-size: 0.7rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.4rem; font-weight: bold; color: white; margin: 5px 0; }

        #status-msg { font-size: 1rem; text-align: center; height: 3rem; color: #fff; line-height: 1.4; }
        #target-display { font-size: 1.8rem; font-weight: 900; color: white; margin: 15px 0; min-height: 2rem; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        
        .life-ui { color: var(--red-point); font-size: 1.2rem; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        button { 
            background: #8d6e63; color: white; border: none; padding: 15px 40px; 
            border-radius: 35px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #replay-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--accent); font-size: 0.8rem; visibility: hidden; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 27, 21, 0.98); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="meter-aside" id="meter">
        </div>

    <div class="game-area">
        <div id="game-over">
            <h2 style="color:var(--red-point); font-size: 2.5rem;">GAME OVER</h2>
            <p>최종 점수: <span id="final-score">0</span></p>
            <button onclick="location.reload()">다시 시작</button>
        </div>

        <div class="header">
            <div class="score-row">
                <span>SCORE: <span id="score-val">0</span></span>
                <span class="life-ui" id="hearts">♥♥♥</span>
            </div>
            <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
            <h1 class="title">Singing Test</h1>
            <div id="level-tag" style="color: var(--gold);">LEVEL 1</div>
        </div>

        <div id="status-msg">버튼을 눌러 게임을 시작하세요.</div>
        <div id="target-display">-</div>

        <div id="user-note-info" style="font-weight: bold; color: var(--gold); height: 1.2rem;"></div>

        <div class="btn-group">
            <button id="replay-btn" onclick="playQuestion()">문제 다시 듣기 ↻</button>
            <button id="start-btn" onclick="initGame()">START GAME</button>
        </div>
    </div>
</div>

<script>
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88]; // C4~B4

let audioCtx, analyser, micStream;
let level = 1, score = 0, lives = 3;
let questionSeq = [], currentStep = 0;
let isListening = false, isPlaying = false;
let blocks = [];

// 1. 32개 블록 생성 (튜너 스타일)
function createMeter() {
    const meter = document.getElementById('meter');
    meter.innerHTML = ''; // 초기화
    blocks = [];
    for (let i = 0; i < 32; i++) {
        const div = document.createElement('div');
        div.className = 'block';
        if (i < 10) div.classList.add('low'); // 하단 (파랑)
        else if (i < 22) div.classList.add('mid'); // 중간 (초록)
        else div.classList.add('high'); // 상단 (빨강)
        meter.appendChild(div);
        blocks.push(div);
    }
}

async function initGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        micStream.connect(analyser);
        createMeter(); // 튜너 UI 생성
    }
    document.getElementById('start-btn').style.display = 'none';
    startNewLevel();
}

function startNewLevel() {
    lives = 3; currentStep = 0; questionSeq = [];
    updateUI();
    for(let i=0; i < level; i++) {
        questionSeq.push(Math.floor(Math.random() * NOTES.length));
    }
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return;
    isPlaying = true; 
    isListening = false; // 재생 중에는 미터와 인식 비활성화
    clearMeter(); 

    document.getElementById('replay-btn').style.visibility = 'hidden';
    document.getElementById('status-msg').innerText = "문제를 듣고 기억하세요.";
    
    let textOut = "";
    for (let idx of questionSeq) {
        document.getElementById('target-display').innerText = NOTES[idx];
        textOut += NOTES[idx] + " ";
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 400));
    }
    
    document.getElementById('target-display').innerText = textOut.trim();
    document.getElementById('status-msg').innerText = "똑같이 따라 부르세요!";
    document.getElementById('replay-btn').style.visibility = 'visible';
    
    isPlaying = false; 
    isListening = true;
    requestAnimationFrame(updateFrame);
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 800);
    });
}

// 2. 실시간 프레임 업데이트 (사용자 응답 시에만 작동)
function updateFrame() {
    if (!isListening) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    
    // 볼륨(데시벨) 계산
    let sum = 0;
    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
    const rms = Math.sqrt(sum / buffer.length);
    
    // 피치 계산
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    // 미터 업데이트 (소리가 날 때만)
    if (pitch !== -1 && rms > 0.05) {
        const midi = 12 * Math.log2(pitch / 261.63); // 도(0) ~ 시(11)
        
        // 정교한 튜너 매핑 로직
        // C4(도) ~ B4(시) 범위를 32개 블록으로 매핑
        let activeCount = Math.round(((midi + 2) / 15) * 32); 
        activeCount = Math.max(1, Math.min(32, activeCount));
        
        updateMeter(activeCount); // 튜너 바 업데이트
    } else {
        clearMeter(); // 소리가 없으면 미터 초기화
    }

    // 정답 판정
    if (pitch !== -1 && rms > 0.05) {
        const midi = Math.round(12 * Math.log2(pitch / 261.63));
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const currentMod = ((midi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(currentMod)) {
            const detected = mapping[currentMod];
            document.getElementById('user-note-info').innerText = `인식: ${NOTES[detected]}`;

            if (detected === questionSeq[currentStep]) {
                currentStep++;
                if (currentStep >= questionSeq.length) {
                    isListening = false;
                    score += 50;
                    document.getElementById('status-msg').innerText = "성공! 다음 레벨로.";
                    level++;
                    setTimeout(startNewLevel, 1300);
                    return;
                }
            } else if (detected !== questionSeq[currentStep]) {
                lives--;
                updateUI();
                if (lives <= 0) showGameOver();
                else {
                    isListening = false;
                    document.getElementById('status-msg').innerText = "틀렸습니다! 다시 듣기...";
                    setTimeout(playQuestion, 1500);
                    return;
                }
            }
        }
    }
    requestAnimationFrame(updateFrame);
}

// 튜너 바 업데이트 (정교하게 차오름)
function updateMeter(count) {
    blocks.forEach((b, i) => {
        if (i < count) b.classList.add('active'); // 활성화
        else b.classList.remove('active'); // 비활성화
    });
}

// 미터 초기화
function clearMeter() {
    blocks.forEach(b => b.classList.remove('active'));
    document.getElementById('user-note-info').innerText = "";
}

function updateUI() {
    document.getElementById('score-val').innerText = score;
    document.getElementById('hearts').innerText = "♥".repeat(lives) + "♡".repeat(3-lives);
    document.getElementById('level-tag').innerText = `LEVEL ${level}`;
}

function showGameOver() {
    isListening = false;
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
}

// 피치 검출 알고리즘 (AMDF)
function getPitch(buffer, sampleRate) {
    let bestP = -1, minD = Infinity;
    for (let p = 35; p < 200; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
