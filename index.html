<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM Guitar Lab Singing Test</title>
    <style>
        :root {
            --bg-dark: #2d1b15;
            --bg-main: #4e342e;
            --accent: #d7ccc8;
            --gold: #ffb74d;
        }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-dark); 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; color: var(--accent); overflow: hidden;
        }

        .container { 
            background-color: var(--bg-main); 
            width: 90%; max-width: 400px; height: 85vh;
            border-radius: 40px; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 2px solid #6d4c41;
            padding: 30px 20px; box-sizing: border-box;
        }

        /* 3. 스코어 표시 레이아웃 */
        .header { text-align: center; width: 100%; }
        .score-box { font-size: 1.2rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
        .brand { font-size: 0.8rem; letter-spacing: 1px; opacity: 0.7; }
        .title { font-size: 1.6rem; font-weight: bold; color: white; margin: 5px 0; }

        /* 중앙 마이크 및 문제 표시 영역 */
        .mic-container {
            width: 140px; height: 140px; background: #6d4c41;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; border: 4px solid var(--bg-dark); transition: 0.3s;
        }
        #target-text-display { font-size: 2rem; font-weight: 900; color: var(--gold); letter-spacing: 5px; text-align: center; }
        
        /* 다시 듣기 버튼 스타일 */
        #replay-btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
            margin-top: 10px; display: none;
        }

        #status-text { font-size: 1.1rem; text-align: center; margin: 15px 0; min-height: 1.5rem; }
        #level-info { font-size: 1.1rem; color: var(--accent); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        button.main-btn { 
            background: #8d6e63; color: white; border: none; 
            padding: 15px 60px; border-radius: 30px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .active-mic { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 183, 77, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div class="brand">SONG,YOUNG-MIN Guitar Lab</div>
        <h1 class="title">Singing Test</h1>
        <div id="level-info">Level 1</div>
    </div>

    <div id="status-text">준비되셨으면 시작하세요!</div>
    
    <div class="mic-container" id="mic-visual">
        <div id="target-text-display">-</div>
    </div>

    <button id="replay-btn" onclick="playQuestion()">음정 다시 듣기 ↻</button>

    <div id="user-pitch-info" style="color: var(--gold); height: 20px;"></div>

    <div class="btn-group">
        <button id="start-btn" class="main-btn" onclick="startGame()">START GAME</button>
    </div>
</div>

<script>
const NOTES = ['도', '레', '미', '파', '솔', '라', '시'];
const FREQS = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];

let audioCtx, analyser, micStream;
let level = 1;
let score = 0;
let questionSequence = [];
let currentStep = 0;
let isListening = false;
let isPlaying = false;

async function startGame() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        micStream.connect(analyser);
    }
    document.getElementById('start-btn').style.display = 'none';
    nextLevel();
}

function nextLevel() {
    currentStep = 0;
    questionSequence = [];
    document.getElementById('level-info').innerText = `Level ${level}`;
    
    // 3. 다이아토닉(C-B) 범위 내 랜덤 생성
    for(let i=0; i < level; i++) {
        questionSequence.push(Math.floor(Math.random() * NOTES.length));
    }
    
    playQuestion();
}

async function playQuestion() {
    if (isPlaying) return; // 중복 재생 방지
    isPlaying = true;
    isListening = false;
    document.getElementById('replay-btn').style.display = 'none';
    document.getElementById('status-text').innerText = "문제를 듣고 기억하세요!";
    
    let combinedText = "";
    document.getElementById('target-text-display').innerText = "-";

    for (let idx of questionSequence) {
        combinedText += NOTES[idx] + " ";
        document.getElementById('target-text-display').innerText = NOTES[idx]; // 하나씩 크게 보여줌
        await playTone(FREQS[idx]);
        await new Promise(r => setTimeout(r, 300));
    }

    // 재생 완료 후 전체 문제 텍스트 표시
    document.getElementById('target-text-display').innerText = combinedText.trim();
    document.getElementById('status-text').innerText = "순서대로 따라 부르세요!";
    document.getElementById('replay-btn').style.display = 'block';
    
    isPlaying = false;
    isListening = true;
    startDetection();
}

function playTone(freq) {
    return new Promise(resolve => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.05);
        gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.5, 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.7);
        setTimeout(resolve, 700);
    });
}

function startDetection() {
    if (!isListening || isPlaying) return;

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);
    const pitch = getPitch(buffer, audioCtx.sampleRate);

    if (pitch !== -1) {
        const semi = Math.round(12 * Math.log2(pitch / 261.63));
        const mapping = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
        const detectedNote = ((semi % 12) + 12) % 12;

        if (mapping.hasOwnProperty(detectedNote)) {
            const noteIdx = mapping[detectedNote];
            document.getElementById('user-pitch-info').innerText = `인식된 음: ${NOTES[noteIdx]}`;

            if (noteIdx === questionSequence[currentStep]) {
                currentStep++;
                // 시각적 피드백
                document.getElementById('mic-visual').classList.add('active-mic');
                setTimeout(() => document.getElementById('mic-visual').classList.remove('active-mic'), 200);

                if (currentStep >= questionSequence.length) {
                    isListening = false;
                    // 점수 계산 (레벨 클리어 시 50점 추가)
                    score += 50;
                    document.getElementById('score').innerText = score;
                    document.getElementById('status-text').innerText = "Great! +50 Point";
                    level++;
                    setTimeout(nextLevel, 1500);
                    return;
                } else {
                    document.getElementById('status-text').innerText = `정답입니다! (${currentStep}/${level})`;
                }
            }
        }
    }
    requestAnimationFrame(startDetection);
}

function getPitch(buffer, sampleRate) {
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    if (Math.sqrt(rms / buffer.length) < 0.05) return -1;

    let bestP = -1;
    let minD = Infinity;
    for (let p = 40; p < 500; p++) {
        let d = 0;
        for (let i = 0; i < buffer.length - p; i++) d += Math.abs(buffer[i] - buffer[i + p]);
        if (d < minD) { minD = d; bestP = p; }
    }
    return sampleRate / bestP;
}
</script>
</body>
</html>
